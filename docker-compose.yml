services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - PII_OLLAMA_BASE=http://localhost:11434
      - PII_OLLAMA_MODEL=phi4-mini
      - PII_OLLAMA_TIMEOUT_MS=600000
      - PII_SPACY_PY=/opt/pii-venv/bin/python3
      - PII_BERT_PY=/opt/pii-venv/bin/python3
      - PII_WEB_PORT=8787
      - PII_DEBUG=1
