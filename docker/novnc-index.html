<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LocalPIIGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: #1a1a1a; font-family: sans-serif;
    }
    a {
      padding: 14px 28px;
      background: #2563eb; color: #fff;
      border-radius: 8px; text-decoration: none;
      font-size: 16px; font-weight: 500;
    }
    a:hover { background: #1d4ed8; }
    p { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <a id="btn" href="/app.html" target="LocalPIIGuard">Open LocalPIIGuard</a>
  <p id="msg"></p>
  <script>
    const OPTS = 'width=900,height=600,resizable=no,toolbar=no,menubar=no,location=no,status=no';
    function openApp() {
      const popup = window.open('/app.html', 'LocalPIIGuard', OPTS);
      if (popup) {
        window.close();
      } else {
        document.getElementById('msg').textContent =
          'Popup blocked — click the button above to open.';
      }
    }
    document.getElementById('btn').addEventListener('click', function(e) {
      e.preventDefault();
      openApp();
    });
    // Auto-open on load
    openApp();
  </script>
</body>
</html>
